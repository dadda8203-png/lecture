<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ostad Saber - Immersion Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 27, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.5);
            --blue: #00d2ff;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 210, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(233, 69, 96, 0.05), transparent 25%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 30px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--text-main), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            width: 70%;
            margin: 0 auto 30px auto;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            background: rgba(0,0,0,0.4);
        }

        button {
            background: linear-gradient(135deg, var(--accent), #ff2a4b);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 20px var(--accent-glow);
            letter-spacing: 1px;
            display: block;
            margin: 0 auto;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(233, 69, 96, 0.6);
        }

        #zone-lecture { display: none; animation: fadeIn 1s ease-out; }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .student-badge {
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--blue);
            border: 1px solid rgba(0, 210, 255, 0.2);
            font-weight: 500;
        }

        #timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 42px;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--blue), var(--accent));
            transition: width 1s linear;
        }

        .lecture-box {
            font-size: 1.25rem;
            line-height: 1.9;
            color: #cbd5e1;
            height: 50vh;
            overflow-y: auto;
            padding-right: 20px;
            text-align: justify;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .lecture-box::-webkit-scrollbar { width: 6px; }
        .lecture-box::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .paragraph { margin-bottom: 30px; }

        .clickable-word {
            color: var(--blue);
            cursor: pointer;
            font-weight: 500;
            position: relative;
            transition: all 0.2s;
            border-bottom: 1px dashed rgba(0, 210, 255, 0.4);
            padding: 0 2px;
        }

        .clickable-word:hover {
            color: #fff;
            background: rgba(0, 210, 255, 0.15);
            border-radius: 4px;
            border-bottom: 1px solid transparent;
            text-shadow: 0 0 8px var(--blue);
        }

        #def-modal {
            display: flex;
            align-items: center;
            gap: 15px;
            position: fixed;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--blue);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.2);
            z-index: 100;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 18px;
            max-width: 80%;
        }

        #def-modal.show { bottom: 40px; }
        
        .def-icon {
            background: var(--blue);
            color: var(--bg-color);
            min-width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-weight: bold;
        }

        #code-final {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--success);
            padding: 30px;
            border-radius: 20px;
            margin-top: 30px;
            text-align: center;
            animation: pulseSuccess 2s infinite;
        }

        .code-title { color: var(--text-muted); font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        .code-value { font-family: 'JetBrains Mono', monospace; font-size: 32px; color: var(--success); font-weight: 800; letter-spacing: 3px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes pulseSuccess { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

    </style>
</head>
<body>

<div class="container" id="main-card">
    <h1>Ostad Saber</h1>
    <div class="subtitle">Protocole d'Immersion Linguistique</div>
    
    <div id="zone-login">
        <div class="input-group">
            <input type="text" id="nomEleve" placeholder="Identification de l'élève (Nom complet)" autocomplete="off">
        </div>
        <button onclick="demarrer()">Démarrer l'Expertise</button>
    </div>

    <div id="zone-lecture">
        <div class="dashboard-header">
            <div class="student-badge">👤 <span id="labelNom"></span></div>
            <div id="timer">30:00</div>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="lecture-box" id="content"></div>

        <div id="code-final">
            <div class="code-title">Session Validée - Code de Certification</div>
            <div class="code-value" id="code-text"></div>
            <p style="color: #94a3b8; font-size: 14px; margin-top: 15px;">Copiez ce code et envoyez-le à l'Ostad sur la messagerie.</p>
        </div>
    </div>
</div>

<div id="def-modal">
    <div class="def-icon">i</div>
    <span id="def-text"></span>
</div>

<script>
    // Configuration du dictionnaire (à compléter selon vos besoins)
    const dico = {
    
    
    "équilibre": "a state in which different elements are in the correct proportions",
"obligations": "duties or commitments that a person is required to fulfill",
"responsabilités": "tasks or duties that someone is accountable for",
"satisfaisante": "giving fulfillment or meeting expectations",
"atteindre": "to reach or achieve a goal",
"sensation": "a feeling or perception resulting from something that happens",
"renforcée": "made stronger or more intense",
"censées": "supposed or believed to do something",
"accéder": "to be able to enter or use something",
"quantité": "an amount or number of something",
"notamment": "especially or in particular",
"compétences": "skills or abilities developed through learning or experience",
"piège": "a situation that is difficult to escape from",
"productives": "producing good or useful results",
"gestion": "the act of organizing or controlling something",
"dépend": "to be influenced or determined by something",
"capacité": "the ability or power to do something",
"organiser": "to arrange or plan systematically",
"strictes": "firmly fixed or controlled with little flexibility",
"planification": "the process of making plans for something",
"flexible": "able to change or adapt easily",
"priorités": "things that are more important than others",
"réellement": "truly or in fact",
"efficacité": "the ability to produce desired results with little waste",
"essentiel": "absolutely necessary or extremely important",
"intégrante": "forming a necessary part of something",
"productivité": "the rate at which work is completed",
"détriment": "harm or damage caused to something",
"négligent": "fail to take proper care of something",
"pause": "a short break from an activity",
"études": "research or detailed investigations",
"récupération": "the process of regaining strength or energy",
"investissement": "something that is done for future benefit",
"pression": "force or influence that causes stress",
"réseaux": "connected systems or groups",
"comparaison": "the act of examining similarities and differences",
"constante": "continuous or happening all the time",
"insatisfaction": "lack of satisfaction",
"surcharger": "to give too much work or responsibility",
"parcours": "a person’s path or journey through life",
"domaine": "a specific area of activity or knowledge",
"employeurs": "people or organizations that hire workers",
"délais": "fixed times by which something must be done",
"environnements": "the conditions or surroundings in which people operate",
"interruptions": "events that stop or disturb an activity",
"imprévues": "not expected or planned",
"perturber": "to disturb or interrupt",
"avancement": "progress or forward movement",
"crucial": "extremely important or necessary",
"fondamental": "forming a basic or essential part",
"échéances": "deadlines or fixed times for completion",
"autonomie": "the ability to act independently",
"programmes": "organized plans or systems",
"perception": "the way something is understood or interpreted",
"sociétés": "organized groups of people living together",
"ponctualité": "the habit of being on time",
"privilégiée": "given special importance or advantage",
"malentendus": "misunderstandings or wrong interpretations",
"contexte": "the situation in which something happens",
"adapter": "to adjust to new conditions",
"relations": "connections or interactions between people",
"négliger": "to fail to give proper attention to something",
"réserver": "to keep something for a particular purpose",
"contribuent": "help to cause or bring about something",
"évolutif": "developing or changing over time",
"circonstances": "conditions or situations affecting something",
"objectifs": "goals or aims",
"réévaluer": "to assess again",
"ajustements": "small changes made to improve something",
"adaptation": "the process of changing to fit new conditions",
"complexe": "consisting of many connected parts",
"connaissance": "awareness or understanding of something",
"préserver": "to maintain or keep something in good condition",
"stratégies": "planned methods to achieve a goal",
"conscient": "aware of something",
"priorités": "things that are most important",
"satisfaisante": "meeting expectations or needs"
};

    const motsExclus = ["dans", "avec", "pour", "mais", "pourrait"];

    const texteParagraphes = [
        "De nos jours, la question du temps et de son utilisation occupe une place centrale dans la vie de nombreuses personnes. Entre les obligations professionnelles, les études, les responsabilités familiales et les loisirs, chacun tente de trouver un équilibre qui lui permette de vivre de manière satisfaisante. Pourtant, cet équilibre semble souvent difficile à atteindre. Beaucoup ont l’impression de courir après le temps sans jamais réussir à le rattraper. Cette sensation est renforcée par les nouvelles technologies, qui, bien qu’elles soient censées nous faire gagner du temps, finissent parfois par nous en faire perdre davantage.",

"En effet, les outils numériques ont profondément transformé notre manière de vivre et de travailler. Les smartphones, les ordinateurs et les applications permettent aujourd’hui d’accéder à une quantité immense d’informations en quelques secondes. Cela peut être extrêmement utile, notamment pour apprendre de nouvelles compétences ou rester en contact avec ses proches. Cependant, cette facilité d’accès peut également devenir un piège. Il est facile de passer des heures sur les réseaux sociaux ou à regarder des vidéos, sans même s’en rendre compte. Ainsi, le temps que l’on pensait économiser est finalement perdu dans des activités peu productives.",

"Par ailleurs, la gestion du temps ne dépend pas uniquement des outils que nous utilisons, mais aussi de notre capacité à organiser nos journées. Certaines personnes adoptent des méthodes strictes, comme la planification détaillée de chaque tâche, tandis que d’autres préfèrent une approche plus flexible. Il n’existe pas de solution unique, car chaque individu a ses propres besoins et son propre rythme. Toutefois, il est généralement conseillé de définir des priorités claires afin de se concentrer sur ce qui est réellement important. Cela permet de réduire le stress et d’augmenter l’efficacité.",

"En outre, il est essentiel de comprendre que le repos fait partie intégrante d’une bonne gestion du temps. Dans une société où la productivité est souvent valorisée au détriment du bien-être, beaucoup de personnes négligent leur besoin de repos. Elles travaillent sans pause, pensant ainsi être plus efficaces. Pourtant, plusieurs études ont montré que le cerveau a besoin de moments de récupération pour fonctionner correctement. Prendre du temps pour se détendre, dormir suffisamment ou pratiquer une activité agréable n’est donc pas une perte de temps, mais un investissement dans sa propre santé.",

"De plus, la pression sociale joue un rôle important dans notre rapport au temps. Les réseaux sociaux, en particulier, donnent souvent l’impression que les autres réussissent mieux et font plus de choses en moins de temps. Cette comparaison constante peut générer un sentiment d’insatisfaction et pousser certaines personnes à se surcharger inutilement. Il est donc important de prendre du recul et de se rappeler que chaque parcours est différent. Ce qui fonctionne pour une personne ne convient pas forcément à une autre.",

"Dans le domaine professionnel, la gestion du temps est souvent considérée comme une compétence essentielle. Les employeurs recherchent des individus capables de respecter des délais et d’organiser leur travail de manière efficace. Cela peut représenter un défi, surtout dans des environnements où les interruptions sont fréquentes. Les réunions imprévues, les messages urgents et les demandes de dernière minute peuvent perturber la concentration et ralentir l’avancement des tâches. Apprendre à gérer ces interruptions est donc crucial pour maintenir une bonne productivité.",

"Par ailleurs, l’éducation joue un rôle fondamental dans l’apprentissage de la gestion du temps. Dès le plus jeune âge, les élèves doivent apprendre à organiser leurs devoirs, à respecter des échéances et à développer leur autonomie. Ces compétences leur seront utiles tout au long de leur vie. Cependant, tous les systèmes éducatifs ne mettent pas suffisamment l’accent sur cet aspect. Il serait donc bénéfique d’intégrer davantage d’activités visant à développer ces compétences dans les programmes scolaires.",

"Il est également intéressant de noter que la perception du temps varie selon les cultures. Dans certaines sociétés, la ponctualité et l’organisation sont considérées comme des valeurs essentielles, tandis que dans d’autres, une approche plus détendue est privilégiée. Cette différence peut parfois entraîner des malentendus, notamment dans un contexte professionnel international. Comprendre ces différences culturelles permet de mieux s’adapter et d’éviter les conflits.",

"En ce qui concerne la vie personnelle, la gestion du temps a un impact direct sur la qualité des relations. Passer du temps avec ses proches, écouter les autres et partager des moments importants nécessite une certaine organisation. Si une personne est constamment occupée ou distraite, elle risque de négliger ces aspects essentiels de la vie. Il est donc important de réserver du temps pour les relations humaines, qui contribuent largement au bien-être et au bonheur.",

"Enfin, il convient de souligner que la gestion du temps est un processus évolutif. Les besoins et les priorités changent au fil du temps, en fonction des circonstances et des objectifs personnels. Ce qui fonctionne aujourd’hui ne sera peut-être plus adapté demain. Il est donc nécessaire de réévaluer régulièrement son organisation et d’apporter des ajustements si nécessaire. Cette capacité d’adaptation est essentielle pour maintenir un équilibre durable.",

"En conclusion, la gestion du temps est un défi complexe qui nécessite à la fois des compétences organisationnelles, une bonne connaissance de soi et une capacité d’adaptation. Dans un monde en constante évolution, il est plus important que jamais de savoir utiliser son temps de manière efficace, tout en préservant son bien-être. En adoptant des stratégies adaptées et en restant conscient de ses priorités, chacun peut améliorer sa relation au temps et mener une vie plus équilibrée et plus satisfaisante.",  ];

    let modalTimeout;

    function genererTexte() {
        const contentDiv = document.getElementById('content');
        let motsVusGlobalement = new Set();

        texteParagraphes.forEach(para => {
            let pTag = document.createElement('div');
            pTag.className = 'paragraph';
            
            // Regex améliorée pour scinder en gardant tout
            const fragments = para.split(/(\s+|[,.;’'!?]+)/);
            
            fragments.forEach(frag => {
                const cleanWord = frag.toLowerCase().replace(/[^a-zàâçéèêëîïôûùüÿñæœ]/g, '');
                
                if (cleanWord.length > 3 && !motsExclus.includes(cleanWord) && dico[cleanWord] && !motsVusGlobalement.has(cleanWord)) {
                    let span = document.createElement('span');
                    span.className = 'clickable-word';
                    span.innerText = frag;
                    span.onclick = (e) => {
                        e.stopPropagation();
                        montrerDef(frag, dico[cleanWord]);
                    };
                    pTag.appendChild(span);
                    motsVusGlobalement.add(cleanWord);
                } else {
                    pTag.appendChild(document.createTextNode(frag));
                }
            });
            contentDiv.appendChild(pTag);
        });
    }

    function montrerDef(motOriginal, definition) {
        const modal = document.getElementById('def-modal');
        const texte = document.getElementById('def-text');
        
        texte.innerHTML = `<strong style="color:var(--blue)">${motOriginal.toUpperCase()}</strong> : ${definition}`;
        modal.classList.add('show');
        
        clearTimeout(modalTimeout);
        modalTimeout = setTimeout(() => {
            modal.classList.remove('show');
        }, 5000);
    }

    // Fermer la popup si on clique ailleurs
    document.addEventListener('click', () => {
        document.getElementById('def-modal').classList.remove('show');
    });

    function demarrer() {
        const nom = document.getElementById('nomEleve').value.trim();
        if(nom.length < 3) {
            document.getElementById('nomEleve').style.borderColor = "var(--accent)";
            return;
        }
        
        document.getElementById('zone-login').style.display = 'none';
        document.getElementById('zone-lecture').style.display = 'block';
        document.getElementById('labelNom').innerText = nom;
        
        genererTexte();
        lancerChrono(nom, 1800); // 30 minutes
    }

    function lancerChrono(nom, tempsTotal) {
        let sec = tempsTotal; 
        const bar = document.getElementById('progressBar');
        
        const interval = setInterval(() => {
            sec--;
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer').innerText = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            
            let pourcentage = ((tempsTotal - sec) / tempsTotal) * 100;
            bar.style.width = pourcentage + "%";

            if(sec <= 0) {
                clearInterval(interval);
                terminerSession(nom);
            }
        }, 1000);
    }

    function terminerSession(nom) {
        document.getElementById('timer').innerText = "VÉRIFIÉ";
        document.getElementById('timer').style.color = "var(--success)";
        document.getElementById('progressBar').style.background = "var(--success)";
        
        document.getElementById('content').style.opacity = "0.2";
        document.getElementById('content').style.pointerEvents = "none";
        
        const codeBox = document.getElementById('code-final');
        const codeText = document.getElementById('code-text');
        
        const d = new Date();
        const mois = d.toLocaleString('fr-FR', { month: 'short' }).toUpperCase().replace('.', '');
        let hash = Math.random().toString(36).substring(2, 5).toUpperCase();
        
        codeText.innerText = `SABER-${hash}-${mois}`;
        codeBox.style.display = 'block';
        codeBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
</body>
</html>
