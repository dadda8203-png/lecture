<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Lecture - Étude Dirigée</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #eceff1; 
            color: #2c3e50;
        }
        .container { 
            width: 90%;
            max-width: 800px;
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        h1 { 
            border-left: 5px solid #2c3e50;
            padding-left: 15px;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }
        #timer-container { 
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #7f8c8d;
        }
        #timer { 
            font-weight: bold; 
            color: #e74c3c; 
        }
        #texte {
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: justify;
            min-height: 200px;
            padding: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="timer-container">
            Temps de lecture : <span id="timer">0</span> secondes
        </div>
        
        <h1>Le Lion de Martil</h1>
        
        <div id="texte">
            <p>Le contenu de la leçon s'affichera ici pour l'étudiant.</p>
        </div>
    </div>

    <script>
        let secondes = 0;
        const timerElement = document.getElementById('timer');
        
        setInterval(() => {
            secondes++;
            timerElement.innerText = secondes;
        }, 1000);
    </script>

</body>
</html>
