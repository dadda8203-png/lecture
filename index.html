<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xling - Plateforme d'Immersion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 27, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #e94560;
            --blue: #00d2ff;
            --success: #10b981;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        h1 { text-align: center; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #zone-lecture { display: none; }

        .input-group { text-align: center; margin-bottom: 30px; }
        input { padding: 15px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; width: 60%; font-size: 16px; text-align: center; outline: none; }
        input:focus { border-color: var(--blue); }

        button { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: 800; display: block; margin: 20px auto; transition: 0.3s; }
        button:hover { transform: scale(1.02); opacity: 0.9; }

        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #timer { font-family: 'JetBrains Mono'; font-size: 32px; color: var(--blue); }

        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 20px; }
        .progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 1s linear; }

        .lecture-box { font-size: 1.2rem; line-height: 1.8; color: #cbd5e1; max-height: 60vh; overflow-y: auto; text-align: justify; padding-right: 15px; }
        .paragraph { margin-bottom: 25px; }

        #code-final { display: none; text-align: center; margin-top: 20px; padding: 20px; border: 2px solid var(--success); border-radius: 15px; background: rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>Ostad Saber</h1>
    
    <div id="zone-login">
        <div class="input-group">
            <input type="text" id="nomEleve" placeholder="Entrez votre nom complet">
        </div>
        <button onclick="demarrer()">Lancer la session quotidienne</button>
    </div>

    <div id="zone-lecture">
        <div class="dashboard-header">
            <div style="color: var(--blue)">Session de : <span id="labelNom"></span></div>
            <div id="timer">30:00</div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <div class="lecture-box" id="content"></div>
        <div id="code-final">
            <div style="color: var(--success); font-weight: 800; margin-bottom: 10px;">TRAVAIL VÉRIFIÉ</div>
            <div id="code-text" style="font-family: 'JetBrains Mono'; font-size: 24px; color: #fff;"></div>
        </div>
    </div>
</div>

<script>
    // --- CATALOGUE DES TEXTES ---
    const catalogueLecons = [
        { 
            "texte": [
                "Le Maître de son Temps : L'Odyssée d'un Entrepreneur Moderne",
                "Dans le tumulte des métropoles contemporaines, où le bruit des notifications remplace celui de la nature, une question fondamentale se pose : qui est réellement le maître de notre temps ?",
                "La rupture avec le modèle traditionnel : Le modèle classique du travail, hérité du siècle dernier, repose sur une présence physique constante et une hiérarchie rigide. Cependant, l'avènement des outils numériques a brisé ces chaînes.",
                "L'art de l'investissement et la psychologie du risque : Bâtir un patrimoine ne se résume pas à accumuler des chiffres sur un écran. C'est avant tout un exercice de maîtrise de soi.",
                "Conclusion : Le succès n'est pas un événement soudain, c'est la cristallisation d'efforts quotidiens invisibles."
            ] 
        },
        { 
            "texte": [
                "L'Architecte du Code : Bâtir des Fondations Invisibles",
                "Apprendre le développement web, c'est avant tout apprendre à structurer sa pensée pour transformer une idée abstraite en une interface fonctionnelle.",
                "Tout commence par les fondations : le HTML et le CSS. Le HTML représente l'ossature, les murs porteurs d'un site.",
                "La rigueur est la vertu cardinale du développeur. Chaque bug résolu n'est pas seulement une victoire technique, c'est une leçon de résilience.",
                "Conclusion : En maîtrisant les outils du développement web, on bâtit un espace de liberté et de transmission."
            ] 
        },
        { 
            "texte": [
                "L'Octogone de la Vie : Discipline et Stratégie",
                "Le combat ne commence jamais le jour où l'on monte dans la cage. Il commence des mois auparavant, dans l'ombre d'une salle d'entraînement.",
                "La discipline est le premier pilier de la réussite. Se lever à l'aube pour courir sous la pluie demande une force de caractère exceptionnelle.",
                "Dans l'octogone, la force brute ne suffit pas. Le MMA est souvent comparé à une partie d'échecs humaine.",
                "Conclusion : Le véritable combat est celui que nous menons chaque jour contre notre propre paresse."
            ] 
        }
    ];

    // --- LOGIQUE CORE ---
    function genererTexte() {
        const dateRef = new Date();
        // Utilise le jour du mois pour choisir le texte (1er jour = index 0)
        const indexLecon = (dateRef.getDate() - 1) % catalogueLecons.length;
        const leconDuJour = catalogueLecons[indexLecon];
        
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = "";
        
        leconDuJour.texte.forEach(para => {
            let pTag = document.createElement('div');
            pTag.className = 'paragraph';
            pTag.innerText = para;
            contentDiv.appendChild(pTag);
        });
    }

    function demarrer() {
        const inputNom = document.getElementById('nomEleve');
        const nom = inputNom.value.trim();
        
        if(nom.length < 2) {
            alert("Veuillez entrer un nom valide.");
            return;
        }

        document.getElementById('zone-login').style.display = 'none';
        document.getElementById('zone-lecture').style.display = 'block';
        document.getElementById('labelNom').innerText = nom;
        
        genererTexte();
        lancerChrono(1800); // 30 minutes
    }

    function lancerChrono(temps) {
        let restant = temps;
        const timerTag = document.getElementById('timer');
        const bar = document.getElementById('progressBar');
        
        const itv = setInterval(() => {
            restant--;
            let m = Math.floor(restant / 60);
            let s = restant % 60;
            
            timerTag.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            bar.style.width = ((temps - restant) / temps * 100) + "%";
            
            if(restant <= 0) {
                clearInterval(itv);
                finaliser();
            }
        }, 1000);
    }

    function finaliser() {
        document.getElementById('code-final').style.display = 'block';
        const hash = Math.random().toString(36).substring(7).toUpperCase();
        document.getElementById('code-text').innerText = `SABER-CERT-${hash}`;
        document.getElementById('content').style.opacity = "0.3";
    }
</script>
</body>
</html>
