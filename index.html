<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ostad Saber - Immersion Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 27, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.5);
            --blue: #00d2ff;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 210, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(233, 69, 96, 0.05), transparent 25%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 30px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--text-main), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            width: 70%;
            margin: 0 auto 30px auto;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            background: rgba(0,0,0,0.4);
        }

        button {
            background: linear-gradient(135deg, var(--accent), #ff2a4b);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 20px var(--accent-glow);
            letter-spacing: 1px;
            display: block;
            margin: 0 auto;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(233, 69, 96, 0.6);
        }

        #zone-lecture { display: none; animation: fadeIn 1s ease-out; }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .student-badge {
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--blue);
            border: 1px solid rgba(0, 210, 255, 0.2);
            font-weight: 500;
        }

        #timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 42px;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--blue), var(--accent));
            transition: width 1s linear;
        }

        .lecture-box {
            font-size: 1.25rem;
            line-height: 1.9;
            color: #cbd5e1;
            height: 50vh;
            overflow-y: auto;
            padding-right: 20px;
            text-align: justify;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .lecture-box::-webkit-scrollbar { width: 6px; }
        .lecture-box::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .paragraph { margin-bottom: 30px; }

        .clickable-word {
            color: var(--blue);
            cursor: pointer;
            font-weight: 500;
            position: relative;
            transition: all 0.2s;
            border-bottom: 1px dashed rgba(0, 210, 255, 0.4);
            padding: 0 2px;
        }

        .clickable-word:hover {
            color: #fff;
            background: rgba(0, 210, 255, 0.15);
            border-radius: 4px;
            border-bottom: 1px solid transparent;
            text-shadow: 0 0 8px var(--blue);
        }

        #def-modal {
            display: flex;
            align-items: center;
            gap: 15px;
            position: fixed;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--blue);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.2);
            z-index: 100;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 18px;
            max-width: 80%;
        }

        #def-modal.show { bottom: 40px; }
        
        .def-icon {
            background: var(--blue);
            color: var(--bg-color);
            min-width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-weight: bold;
        }

        #code-final {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--success);
            padding: 30px;
            border-radius: 20px;
            margin-top: 30px;
            text-align: center;
            animation: pulseSuccess 2s infinite;
        }

        .code-title { color: var(--text-muted); font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        .code-value { font-family: 'JetBrains Mono', monospace; font-size: 32px; color: var(--success); font-weight: 800; letter-spacing: 3px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes pulseSuccess { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

    </style>
</head>
<body>

<div class="container" id="main-card">
    <h1>Ostad Saber</h1>
    <div class="subtitle">Protocole d'Immersion Linguistique</div>
    
    <div id="zone-login">
        <div class="input-group">
            <input type="text" id="nomEleve" placeholder="Identification de l'élève (Nom complet)" autocomplete="off">
        </div>
        <button onclick="demarrer()">Démarrer l'Expertise</button>
    </div>

    <div id="zone-lecture">
        <div class="dashboard-header">
            <div class="student-badge">👤 <span id="labelNom"></span></div>
            <div id="timer">30:00</div>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="lecture-box" id="content"></div>

        <div id="code-final">
            <div class="code-title">Session Validée - Code de Certification</div>
            <div class="code-value" id="code-text"></div>
            <p style="color: #94a3b8; font-size: 14px; margin-top: 15px;">Copiez ce code et envoyez-le à l'Ostad sur la messagerie.</p>
        </div>
    </div>
</div>

<div id="def-modal">
    <div class="def-icon">i</div>
    <span id="def-text"></span>
</div>

<script>
    // Configuration du dictionnaire (à compléter selon vos besoins)
    const dico = {
    "suscite": "to cause or provoke a reaction.",
    "croissant": "increasing, growing.",
    "frontière": "boundary / border.",
    "connecté": "connected.",
    "permanence": "permanence / constantly.",
    "inconvénients": "disadvantages.",
    "conséquences": "consequences, results.",
    "convient": "is appropriate / necessary.",
    "souligner": "to emphasize or highlight.",
    "numériques": "digital.",
    "flexibilité": "flexibility.",
    "autonomie": "autonomy or independence.",
    "disparaissent": "disappear.",
    "obligation": "obligation or duty.",
    "fatigue": "fatigue / tiredness.",
    "épuisement": "burnout / exhaustion.",
    "professionnel": "professional.",
    "pression": "pressure.",
    "performance": "performance.",
    "compétitif": "competitive.",
    "exigence": "requirement or demand.",
    "phénomène": "phenomenon.",
    "conscience": "awareness / conscience.",
    "conditions": "conditions.",
    "encourager": "to encourage.",
    "flexibles": "flexible.",
    "bien-être": "well-being.",
    "concilier": "to reconcile or balance.",
    "individu": "individual.",
    "priorités": "priorities.",
    "préserver": "to preserve or protect.",
    "détendre": "to relax.",
    "culture": "culture.",
    "perçoivent": "perceive or see.",
    "accent": "emphasis / accent.",
    "influencent": "influence.",
    "contexte": "context.",
    "pandémie": "pandemic.",
    "adapter": "to adapt.",
    "organisation": "organization.",
    "évidence": "evidence / clarity.",
    "routine": "routine.",
    "sociales": "social.",
    "ressourcer": "to recharge energy.",
    "relativiser": "to put into perspective.",
    "émotionnel": "emotional.",
    "épanouissement": "personal fulfillment.",
    "réalisation": "achievement / realization.",
    "marquée": "marked / clear.",
    "subie": "endured or not chosen.",
    "enjeu": "stake / major issue.",
    "majeur": "major.",
    "exigences": "demands or requirements.",
    "stratégies": "strategies.",
    "fragile": "fragile.",
    "équilibre": "balance.",
    "réfléchie": "thoughtful / reflected."
};

    const motsExclus = ["dans", "avec", "pour", "mais", "pourrait"];

    const texteParagraphes = [
        "De nos jours, la question de l’équilibre entre vie professionnelle et vie personnelle suscite un intérêt croissant dans de nombreuses sociétés. Avec le développement des technologies et la possibilité de rester connecté en permanence, il devient de plus en plus difficile de tracer une frontière claire entre le travail et la vie privée. Certaines personnes considèrent que cette évolution offre plus de liberté, tandis que d’autres pensent qu’elle entraîne une pression constante et un stress difficile à gérer. Ainsi, il est essentiel de réfléchir aux avantages et aux inconvénients de cette situation afin de mieux comprendre ses conséquences sur notre quotidien.",
"Tout d’abord, il convient de souligner que les nouvelles technologies ont profondément transformé notre manière de travailler. Grâce aux ordinateurs portables, aux smartphones et aux plateformes numériques, il est désormais possible de travailler depuis presque n’importe quel endroit. Cette flexibilité permet à de nombreux employés d’organiser leur emploi du temps selon leurs besoins personnels. Par exemple, certains peuvent choisir de travailler tôt le matin ou tard le soir afin de passer plus de temps avec leur famille durant la journée. Cette autonomie est souvent perçue comme un progrès majeur.",
"Cependant, cette même flexibilité peut également devenir une source de problèmes. En effet, lorsque les frontières entre le travail et la vie personnelle disparaissent, il devient difficile de se déconnecter. Beaucoup de personnes ressentent l’obligation de répondre aux messages professionnels en dehors des heures de travail, ce qui peut entraîner une fatigue mentale importante. À long terme, cette situation peut provoquer du stress, voire un épuisement professionnel. Il est donc nécessaire de mettre en place des limites claires pour préserver son bien-être.",
"Par ailleurs, la pression liée à la performance joue également un rôle important dans ce déséquilibre. Dans un monde de plus en plus compétitif, les entreprises attendent souvent de leurs employés qu’ils soient toujours plus productifs et efficaces. Cette exigence peut pousser certaines personnes à travailler davantage, même lorsqu’elles devraient se reposer. Elles ont parfois peur de perdre leur emploi ou de ne pas être à la hauteur des attentes. Ce phénomène est particulièrement visible chez les jeunes travailleurs, qui souhaitent prouver leur valeur dès le début de leur carrière.",
"En revanche, certaines entreprises commencent à prendre conscience de ces problèmes et cherchent à améliorer les conditions de travail de leurs employés. Elles mettent en place des politiques visant à encourager un meilleur équilibre entre vie professionnelle et vie personnelle. Par exemple, certaines sociétés proposent des horaires flexibles, des journées de télétravail ou encore des programmes de bien-être. Ces initiatives montrent qu’il est possible de concilier performance économique et respect de la santé des travailleurs.",
"En outre, il est important de considérer le rôle de l’individu dans la gestion de cet équilibre. Chaque personne doit apprendre à organiser son temps et à définir ses priorités. Cela implique parfois de savoir dire non à certaines demandes professionnelles afin de préserver son temps personnel. Il est également essentiel de consacrer du temps à des activités qui permettent de se détendre, comme le sport, la lecture ou les sorties entre amis. Ces moments de repos sont indispensables pour maintenir un bon équilibre mental et physique.",
"De plus, la culture joue un rôle significatif dans la manière dont les individus perçoivent le travail. Dans certains pays, le travail occupe une place centrale dans la vie des gens, tandis que dans d’autres, l’accent est davantage mis sur la qualité de vie. Ces différences culturelles influencent les attentes des employés et les pratiques des entreprises. Par conséquent, il n’existe pas de solution universelle, mais plutôt des approches adaptées à chaque contexte social et culturel.",
"Il est également intéressant de noter que la pandémie de COVID-19 a accéléré ces transformations. Le télétravail s’est largement développé, obligeant de nombreuses personnes à adapter leur mode de vie. Si certains ont apprécié cette nouvelle organisation, d’autres ont rencontré des difficultés à séparer leur vie professionnelle de leur vie personnelle. Cette expérience a mis en évidence l’importance de disposer d’un espace de travail adapté et de maintenir une routine claire pour éviter les dérives.",
"Par ailleurs, la question de l’équilibre entre vie professionnelle et vie personnelle concerne également les relations sociales. Lorsque le travail occupe trop de place, il peut réduire le temps consacré à la famille et aux amis. Or, ces relations sont essentielles pour le bien-être émotionnel. Passer du temps avec ses proches permet de se ressourcer et de relativiser les problèmes liés au travail. Il est donc important de préserver ces moments et de leur accorder une place suffisante dans notre quotidien.",
"D’un autre côté, certaines personnes trouvent un véritable épanouissement dans leur travail. Pour elles, le travail n’est pas seulement une obligation, mais aussi une source de satisfaction et de réalisation personnelle. Dans ce cas, la frontière entre vie professionnelle et vie personnelle peut être moins marquée, sans pour autant être problématique. L’essentiel est que cette situation soit choisie et non subie, et qu’elle ne nuise pas à la santé ou aux relations sociales.",
"En conclusion, l’équilibre entre vie professionnelle et vie personnelle est un enjeu majeur de notre époque. Les évolutions technologiques et les exigences du monde du travail rendent cet équilibre plus difficile à atteindre, mais aussi plus nécessaire que jamais. Il appartient à la fois aux entreprises et aux individus de mettre en place des stratégies adaptées pour préserver ce fragile équilibre. En adoptant une approche réfléchie et en respectant ses propres limites, il est possible de concilier efficacité professionnelle et qualité de vie.",
        ];

    let modalTimeout;

    function genererTexte() {
        const contentDiv = document.getElementById('content');
        let motsVusGlobalement = new Set();

        texteParagraphes.forEach(para => {
            let pTag = document.createElement('div');
            pTag.className = 'paragraph';
            
            // Regex améliorée pour scinder en gardant tout
            const fragments = para.split(/(\s+|[,.;’'!?]+)/);
            
            fragments.forEach(frag => {
                const cleanWord = frag.toLowerCase().replace(/[^a-zàâçéèêëîïôûùüÿñæœ]/g, '');
                
                if (cleanWord.length > 3 && !motsExclus.includes(cleanWord) && dico[cleanWord] && !motsVusGlobalement.has(cleanWord)) {
                    let span = document.createElement('span');
                    span.className = 'clickable-word';
                    span.innerText = frag;
                    span.onclick = (e) => {
                        e.stopPropagation();
                        montrerDef(frag, dico[cleanWord]);
                    };
                    pTag.appendChild(span);
                    motsVusGlobalement.add(cleanWord);
                } else {
                    pTag.appendChild(document.createTextNode(frag));
                }
            });
            contentDiv.appendChild(pTag);
        });
    }

    function montrerDef(motOriginal, definition) {
        const modal = document.getElementById('def-modal');
        const texte = document.getElementById('def-text');
        
        texte.innerHTML = `<strong style="color:var(--blue)">${motOriginal.toUpperCase()}</strong> : ${definition}`;
        modal.classList.add('show');
        
        clearTimeout(modalTimeout);
        modalTimeout = setTimeout(() => {
            modal.classList.remove('show');
        }, 5000);
    }

    // Fermer la popup si on clique ailleurs
    document.addEventListener('click', () => {
        document.getElementById('def-modal').classList.remove('show');
    });

    function demarrer() {
        const nom = document.getElementById('nomEleve').value.trim();
        if(nom.length < 3) {
            document.getElementById('nomEleve').style.borderColor = "var(--accent)";
            return;
        }
        
        document.getElementById('zone-login').style.display = 'none';
        document.getElementById('zone-lecture').style.display = 'block';
        document.getElementById('labelNom').innerText = nom;
        
        genererTexte();
        lancerChrono(nom, 1800); // 30 minutes
    }

    function lancerChrono(nom, tempsTotal) {
        let sec = tempsTotal; 
        const bar = document.getElementById('progressBar');
        
        const interval = setInterval(() => {
            sec--;
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer').innerText = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            
            let pourcentage = ((tempsTotal - sec) / tempsTotal) * 100;
            bar.style.width = pourcentage + "%";

            if(sec <= 0) {
                clearInterval(interval);
                terminerSession(nom);
            }
        }, 1000);
    }

    function terminerSession(nom) {
        document.getElementById('timer').innerText = "VÉRIFIÉ";
        document.getElementById('timer').style.color = "var(--success)";
        document.getElementById('progressBar').style.background = "var(--success)";
        
        document.getElementById('content').style.opacity = "0.2";
        document.getElementById('content').style.pointerEvents = "none";
        
        const codeBox = document.getElementById('code-final');
        const codeText = document.getElementById('code-text');
        
        const d = new Date();
        const mois = d.toLocaleString('fr-FR', { month: 'short' }).toUpperCase().replace('.', '');
        let hash = Math.random().toString(36).substring(2, 5).toUpperCase();
        
        codeText.innerText = `SABER-${hash}-${mois}`;
        codeBox.style.display = 'block';
        codeBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
</body>
</html>
