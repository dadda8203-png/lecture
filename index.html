<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ostad Saber - Immersion Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 27, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.5);
            --blue: #00d2ff;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 210, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(233, 69, 96, 0.05), transparent 25%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 30px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--text-main), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            width: 70%;
            margin: 0 auto 30px auto;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            background: rgba(0,0,0,0.4);
        }

        button {
            background: linear-gradient(135deg, var(--accent), #ff2a4b);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 20px var(--accent-glow);
            letter-spacing: 1px;
            display: block;
            margin: 0 auto;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(233, 69, 96, 0.6);
        }

        #zone-lecture { display: none; animation: fadeIn 1s ease-out; }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .student-badge {
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--blue);
            border: 1px solid rgba(0, 210, 255, 0.2);
            font-weight: 500;
        }

        #timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 42px;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--blue), var(--accent));
            transition: width 1s linear;
        }

        .lecture-box {
            font-size: 1.25rem;
            line-height: 1.9;
            color: #cbd5e1;
            height: 50vh;
            overflow-y: auto;
            padding-right: 20px;
            text-align: justify;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .lecture-box::-webkit-scrollbar { width: 6px; }
        .lecture-box::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .paragraph { margin-bottom: 30px; }

        .clickable-word {
            color: var(--blue);
            cursor: pointer;
            font-weight: 500;
            position: relative;
            transition: all 0.2s;
            border-bottom: 1px dashed rgba(0, 210, 255, 0.4);
            padding: 0 2px;
        }

        .clickable-word:hover {
            color: #fff;
            background: rgba(0, 210, 255, 0.15);
            border-radius: 4px;
            border-bottom: 1px solid transparent;
            text-shadow: 0 0 8px var(--blue);
        }

        #def-modal {
            display: flex;
            align-items: center;
            gap: 15px;
            position: fixed;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--blue);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.2);
            z-index: 100;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 18px;
            max-width: 80%;
        }

        #def-modal.show { bottom: 40px; }
        
        .def-icon {
            background: var(--blue);
            color: var(--bg-color);
            min-width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-weight: bold;
        }

        #code-final {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--success);
            padding: 30px;
            border-radius: 20px;
            margin-top: 30px;
            text-align: center;
            animation: pulseSuccess 2s infinite;
        }

        .code-title { color: var(--text-muted); font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        .code-value { font-family: 'JetBrains Mono', monospace; font-size: 32px; color: var(--success); font-weight: 800; letter-spacing: 3px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes pulseSuccess { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

    </style>
</head>
<body>

<div class="container" id="main-card">
    <h1>Ostad Saber</h1>
    <div class="subtitle">Protocole d'Immersion Linguistique</div>
    
    <div id="zone-login">
        <div class="input-group">
            <input type="text" id="nomEleve" placeholder="Identification de l'élève (Nom complet)" autocomplete="off">
        </div>
        <button onclick="demarrer()">Démarrer l'Expertise</button>
    </div>

    <div id="zone-lecture">
        <div class="dashboard-header">
            <div class="student-badge">👤 <span id="labelNom"></span></div>
            <div id="timer">30:00</div>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="lecture-box" id="content"></div>

        <div id="code-final">
            <div class="code-title">Session Validée - Code de Certification</div>
            <div class="code-value" id="code-text"></div>
            <p style="color: #94a3b8; font-size: 14px; margin-top: 15px;">Copiez ce code et envoyez-le à l'Ostad sur la messagerie.</p>
        </div>
    </div>
</div>

<div id="def-modal">
    <div class="def-icon">i</div>
    <span id="def-text"></span>
</div>

<script>
    // Configuration du dictionnaire (à compléter selon vos besoins)
    const dico = {
        "paradoxe": "Proposition qui va contre l'opinion commune, contradiction apparente.",
        "indéniable": "Que l'on ne peut nier, qui est incontestable.",
        "engendré": "Produit, causé, fait naître.",
        "effréné": "Qui est sans retenue, sans mesure.",
        "cognitive": "Qui concerne les processus de la connaissance et de la pensée.",
        "idéalisée": "Présentée sous un aspect parfait, au-dessus de la réalité.",
        "immédiateté": "Caractère de ce qui est sans délai, direct.",
        "accrue": "Augmentée, devenue plus grande.",
        "aspirations": "Désirs profonds de réaliser quelque chose de grand."
    };

    const motsExclus = ["dans", "avec", "pour", "mais", "pourrait"];

    const texteParagraphes = [
        "À première vue, il semble évident que le progrès technologique a considérablement amélioré la vie humaine. En quelques décennies seulement, nous avons assisté à des transformations spectaculaires : communication instantanée, accès illimité à l’information, progrès médicaux impressionnants et amélioration globale des conditions de vie. Pourtant, malgré ces avancées, un sentiment étrange persiste chez de nombreuses personnes : celui d’un manque, d’une insatisfaction difficile à expliquer. Ce paradoxe mérite d’être analysé.",
        "D’une part, il est indéniable que la technologie a simplifié notre quotidien. Aujourd’hui, il suffit de quelques secondes pour envoyer un message à l’autre bout du monde, réserver un billet d’avion ou apprendre une nouvelle compétence grâce à des plateformes en ligne. Autrefois, ces actions nécessitaient du temps, des efforts considérables et parfois même des déplacements physiques. Cette rapidité a permis de gagner un temps précieux, que l’on pourrait théoriquement consacrer à des activités plus enrichissantes.",
        "Cependant, cette même rapidité a engendré une nouvelle forme de pression. En effet, dans un monde où tout va vite, il devient difficile de ralentir. Les individus se sentent souvent obligés d’être constamment productifs, connectés et disponibles. La frontière entre vie professionnelle et vie personnelle tend à disparaître, ce qui peut entraîner du stress et de l’épuisement. Ainsi, ce qui était censé nous libérer finit parfois par nous enfermer dans un rythme effréné.",
        "Par ailleurs, l’accès massif à l’information représente à la fois une richesse et un danger. D’un côté, il permet à chacun de s’informer, de se cultiver et de développer un esprit critique. De l’autre, il peut provoquer une surcharge cognitive. Face à une quantité infinie de contenus, il devient difficile de distinguer l’essentiel du superflu. De plus, la diffusion rapide de fausses informations complique encore davantage la situation, en semant le doute et la confusion.",
        "En outre, les réseaux sociaux jouent un rôle central dans cette problématique. Ils offrent une plateforme d’expression et de connexion sans précédent, permettant de rester en contact avec ses proches, même à distance. Néanmoins, ils peuvent aussi créer des illusions. Les utilisateurs ont tendance à partager une version idéalisée de leur vie, ce qui peut engendrer des comparaisons négatives chez ceux qui consultent ces contenus. Ce phénomène peut affecter l’estime de soi et contribuer à un sentiment d’infériorité.",
        "Un autre aspect important concerne la relation entre l’homme et le travail. Grâce à l’automatisation et à l’intelligence artificielle, de nombreuses tâches répétitives ont été remplacées par des machines. Cela pourrait être perçu comme une libération, permettant aux individus de se concentrer sur des activités plus créatives et valorisantes. Toutefois, cette transformation soulève également des inquiétudes, notamment en ce qui concerne la perte d’emplois et la nécessité de s’adapter constamment à de nouvelles compétences.",
        "De plus, le progrès a modifié notre rapport au temps. Autrefois, certaines activités nécessitaient de la patience : attendre une lettre, cuisiner lentement, ou encore construire quelque chose de ses propres mains. Aujourd’hui, l’immédiateté est devenue la norme. Cette évolution a réduit notre capacité à tolérer l’attente et à apprécier les processus longs. Or, ces moments de lenteur sont souvent essentiels pour développer la réflexion, la créativité et la satisfaction personnelle.",
        "Il convient également de s’interroger sur l’impact du progrès sur les relations humaines. Bien que les outils numériques facilitent la communication, ils ne remplacent pas toujours la qualité des interactions en face à face. Les échanges virtuels peuvent parfois manquer de profondeur, car ils ne permettent pas de percevoir les émotions de manière aussi riche que dans une conversation directe. Ainsi, malgré une connectivité accrue, certains individus se sentent paradoxalement plus isolés.",
        "D’un point de vue psychologique, cette situation peut s’expliquer par le fait que les besoins fondamentaux de l’être humain n’ont pas changé. Au-delà du confort matériel, les individus recherchent du sens, des relations authentiques et un sentiment d’accomplissement. Or, le progrès technologique, bien qu’il réponde à de nombreux besoins pratiques, ne garantit pas la satisfaction de ces aspirations profondes.",
        "Face à ce constat, certaines personnes choisissent de revenir à un mode de vie plus simple. On observe ainsi un intérêt croissant pour des activités telles que la méditation, le retour à la nature, ou encore la réduction de l’usage des technologies. Ces pratiques visent à rétablir un équilibre et à se reconnecter à l’essentiel. Elles témoignent d’un besoin de ralentir et de retrouver un certain contrôle sur son temps et son attention."
    ];

    let modalTimeout;

    function genererTexte() {
        const contentDiv = document.getElementById('content');
        let motsVusGlobalement = new Set();

        texteParagraphes.forEach(para => {
            let pTag = document.createElement('div');
            pTag.className = 'paragraph';
            
            // Regex améliorée pour scinder en gardant tout
            const fragments = para.split(/(\s+|[,.;’'!?]+)/);
            
            fragments.forEach(frag => {
                const cleanWord = frag.toLowerCase().replace(/[^a-zàâçéèêëîïôûùüÿñæœ]/g, '');
                
                if (cleanWord.length > 3 && !motsExclus.includes(cleanWord) && dico[cleanWord] && !motsVusGlobalement.has(cleanWord)) {
                    let span = document.createElement('span');
                    span.className = 'clickable-word';
                    span.innerText = frag;
                    span.onclick = (e) => {
                        e.stopPropagation();
                        montrerDef(frag, dico[cleanWord]);
                    };
                    pTag.appendChild(span);
                    motsVusGlobalement.add(cleanWord);
                } else {
                    pTag.appendChild(document.createTextNode(frag));
                }
            });
            contentDiv.appendChild(pTag);
        });
    }

    function montrerDef(motOriginal, definition) {
        const modal = document.getElementById('def-modal');
        const texte = document.getElementById('def-text');
        
        texte.innerHTML = `<strong style="color:var(--blue)">${motOriginal.toUpperCase()}</strong> : ${definition}`;
        modal.classList.add('show');
        
        clearTimeout(modalTimeout);
        modalTimeout = setTimeout(() => {
            modal.classList.remove('show');
        }, 5000);
    }

    // Fermer la popup si on clique ailleurs
    document.addEventListener('click', () => {
        document.getElementById('def-modal').classList.remove('show');
    });

    function demarrer() {
        const nom = document.getElementById('nomEleve').value.trim();
        if(nom.length < 3) {
            document.getElementById('nomEleve').style.borderColor = "var(--accent)";
            return;
        }
        
        document.getElementById('zone-login').style.display = 'none';
        document.getElementById('zone-lecture').style.display = 'block';
        document.getElementById('labelNom').innerText = nom;
        
        genererTexte();
        lancerChrono(nom, 1800); // 30 minutes
    }

    function lancerChrono(nom, tempsTotal) {
        let sec = tempsTotal; 
        const bar = document.getElementById('progressBar');
        
        const interval = setInterval(() => {
            sec--;
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer').innerText = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            
            let pourcentage = ((tempsTotal - sec) / tempsTotal) * 100;
            bar.style.width = pourcentage + "%";

            if(sec <= 0) {
                clearInterval(interval);
                terminerSession(nom);
            }
        }, 1000);
    }

    function terminerSession(nom) {
        document.getElementById('timer').innerText = "VÉRIFIÉ";
        document.getElementById('timer').style.color = "var(--success)";
        document.getElementById('progressBar').style.background = "var(--success)";
        
        document.getElementById('content').style.opacity = "0.2";
        document.getElementById('content').style.pointerEvents = "none";
        
        const codeBox = document.getElementById('code-final');
        const codeText = document.getElementById('code-text');
        
        const d = new Date();
        const mois = d.toLocaleString('fr-FR', { month: 'short' }).toUpperCase().replace('.', '');
        let hash = Math.random().toString(36).substring(2, 5).toUpperCase();
        
        codeText.innerText = `SABER-${hash}-${mois}`;
        codeBox.style.display = 'block';
        codeBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
</body>
</html>
