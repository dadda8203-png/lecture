<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xling - Plateforme d'Immersion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 27, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #e94560;
            --blue: #00d2ff;
            --success: #10b981;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        h1 { text-align: center; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #zone-lecture { display: none; }

        .input-group { text-align: center; margin-bottom: 30px; }
        input { padding: 15px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: white; width: 60%; font-size: 16px; text-align: center; }

        button { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: 800; display: block; margin: 20px auto; transition: 0.3s; }

        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #timer { font-family: 'JetBrains Mono'; font-size: 32px; }

        .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 20px; }
        .progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 1s linear; }

        .lecture-box { font-size: 1.2rem; line-height: 1.8; color: #cbd5e1; max-height: 60vh; overflow-y: auto; text-align: justify; padding-right: 15px; }
        .paragraph { margin-bottom: 25px; }

        #code-final { display: none; text-align: center; margin-top: 20px; padding: 20px; border: 2px solid var(--success); border-radius: 15px; background: rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>Ostad Saber</h1>
    
    <div id="zone-login">
        <div class="input-group">
            <input type="text" id="nomEleve" placeholder="Entrez votre nom complet">
        </div>
        <button onclick="demarrer()">Lancer la session quotidienne</button>
    </div>

    <div id="zone-lecture">
        <div class="dashboard-header">
            <div style="color: var(--blue)">Session de : <span id="labelNom"></span></div>
            <div id="timer">30:00</div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <div class="lecture-box" id="content"></div>
        <div id="code-final">
            <div style="color: var(--success); font-weight: 800; margin-bottom: 10px;">TRAVAIL VÉRIFIÉ</div>
            <div id="code-text" style="font-family: 'JetBrains Mono'; font-size: 24px; color: #fff;"></div>
        </div>
    </div>
</div>

<script>
    // --- CATALOGUE DES 30 JOURS (À REMPLIR) ---
    // Ajoute tes textes entre les crochets [] de chaque objet.
    const catalogueLecons = [
        { "texte": ["Texte Jour 1 :Le Maître de son Temps : L'Odyssée d'un Entrepreneur Moderne
Dans le tumulte des métropoles contemporaines, où le bruit des notifications remplace celui de la nature, une question fondamentale se pose : qui est réellement le maître de notre temps ? Pour beaucoup, la journée est une suite de tâches imposées, une course contre la montre où l'on finit souvent par perdre son souffle. Pourtant, pour une nouvelle génération d'esprits libres, l'indépendance n'est pas un luxe, mais une stratégie de vie méticuleuse.

La rupture avec le modèle traditionnel
Le modèle classique du travail, hérité du siècle dernier, repose sur une présence physique constante et une hiérarchie rigide. Cependant, l'avènement des outils numériques a brisé ces chaînes. Aujourd'hui, un jeune entrepreneur peut bâtir un empire depuis sa chambre, à condition de posséder une arme redoutable : l'autodiscipline. Sans patron pour surveiller ses horaires, l'individu devient son propre général. C'est ici que commence le véritable défi. Comme un navire sans boussole dans l'immensité de l'océan, celui qui ne sait pas s'organiser risque de dériver indéfiniment.

La discipline ne doit pas être vue comme une prison, mais comme le socle de la liberté. En imposant des limites strictes à ses distractions, on crée un espace sacré pour la création et la réflexion. C'est dans ce silence choisi que naissent les projets les plus ambitieux, comme ces plateformes éducatives qui transforment la manière dont nous apprenons les langues.

L'art de l'investissement et la psychologie du risque
Bâtir un patrimoine ne se résume pas à accumuler des chiffres sur un écran. C'est avant tout un exercice de maîtrise de soi. L'investisseur moderne doit naviguer entre l'euphorie des marchés et le désespoir des crises. L'erreur la plus fatale, souvent commise par les débutants, est de suivre la foule. Lorsque tout le monde achète par peur de rater une occasion, le sage observe et attend. Lorsqu'une panique générale pousse les autres à vendre, il cherche les opportunités cachées.

La gestion financière est une métaphore de la gestion émotionnelle. Pour protéger son capital, il faut d'abord protéger son esprit contre l'instinct grégaire. La diversification, qu'il s'agisse de métaux précieux comme l'or ou d'actifs numériques, n'est qu'un outil technique au service d'une vision à long terme. Le but ultime reste la souveraineté temporelle : ne plus travailler pour l'argent, mais faire en sorte que l'argent travaille pour nous.

La technologie : alliée ou ennemie ?
L'intelligence artificielle transforme radicalement nos méthodes de travail. Elle peut rédiger des textes, analyser des données et automatiser des processus complexes. Pour l'entrepreneur aguerri, c'est une aubaine qui permet de déléguer les tâches ingrates. Mais attention : l'outil ne doit jamais remplacer le jugement humain. L'IA peut générer du contenu, mais elle ne peut pas insuffler d'âme à un projet, ni établir une relation de confiance profonde avec un partenaire ou un élève.

La transparence et l'intégrité sont les piliers de toute réussite durable. Dans un monde saturé de promesses superficielles, l'honnêteté devient une expertise rare et valorisée. Un tuteur qui donne un retour rigoureux et honnête à ses élèves, sans chercher à les flatter, construit une autorité bien plus solide que celui qui cherche simplement à plaire.

L'équilibre entre ambition et sérénité
La quête de la réussite peut parfois devenir dévorante. On se surprend à vérifier ses courriels à minuit ou à stresser pour un détail technique. C'est là que réside le paradoxe : pour être productif, il faut savoir s'arrêter. Le repos n'est pas une perte de temps, c'est une phase de maintenance indispensable. Cultiver son "Ikigai", ce point d'équilibre entre ce que l'on aime, ce pour quoi on est doué et ce dont le monde a besoin, est le secret d'une vie prospère.

En fin de compte, la richesse intérieure acquise au fil des échecs et des résolutions de bugs complexes constitue un trésor inaliénable. Chaque ligne de code écrite, chaque leçon donnée et chaque investissement réfléchi sont des pierres posées sur l'édifice de notre propre destin.

Conclusion
Le succès n'est pas un événement soudain, c'est la cristallisation d'efforts quotidiens invisibles. C'est le résultat d'une volonté de fer qui refuse de subir les priorités d'autrui. En devenant maître de son temps, on ne gagne pas seulement de l'argent ; on conquiert la ressource la plus précieuse et la plus rare qui soit. La véritable définition de la prospérité se trouve dans ce dialogue intemporel entre une ambition matérielle légitime et une sérénité intellectuelle inébranlable. "] },
        { "texte": ["Texte Jour 2 : À remplir."] },
        { "texte": ["Texte Jour 3 : À remplir."] },
        { "texte": ["Texte Jour 4 : À remplir."] },

        { "texte": ["Texte Jour 29 : À remplir."] },
        { "texte": ["Texte Jour 30 : À remplir."] }
    ];

    // --- LOGIQUE DE ROTATION ---
    const dateRef = new Date();
    // (Jour actuel - 1) modulo longueur du catalogue pour tomber sur l'index 0-29
    const indexLecon = (dateRef.getDate() - 1) % catalogueLecons.length;
    const leconDuJour = catalogueLecons[indexLecon];

    function genererTexte() {
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = "";
        leconDuJour.texte.forEach(para => {
            let pTag = document.createElement('div');
            pTag.className = 'paragraph';
            pTag.innerText = para;
            contentDiv.appendChild(pTag);
        });
    }

    function demarrer() {
        const nom = document.getElementById('nomEleve').value.trim();
        if(nom.length < 2) return;
        document.getElementById('zone-login').style.display = 'none';
        document.getElementById('zone-lecture').style.display = 'block';
        document.getElementById('labelNom').innerText = nom;
        genererTexte();
        lancerChrono(1800); // 30 minutes
    }

    function lancerChrono(temps) {
        let restant = temps;
        const timerTag = document.getElementById('timer');
        const bar = document.getElementById('progressBar');
        const itv = setInterval(() => {
            restant--;
            let m = Math.floor(restant / 60);
            let s = restant % 60;
            timerTag.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            bar.style.width = ((temps - restant) / temps * 100) + "%";
            if(restant <= 0) {
                clearInterval(itv);
                finaliser();
            }
        }, 1000);
    }

    function finaliser() {
        document.getElementById('code-final').style.display = 'block';
        const hash = Math.random().toString(36).substring(7).toUpperCase();
        const mois = new Date().toLocaleString('fr-FR', { month: 'short' }).toUpperCase();
        document.getElementById('code-text').innerText = `SABER-${mois}-${hash}`;
        document.getElementById('content').style.opacity = "0.3";
        document.getElementById('content').style.pointerEvents = "none";
    }
</script>
</body>
</html>
