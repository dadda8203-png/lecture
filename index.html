<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ostad Saber - Immersion Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(20, 27, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.5);
            --blue: #00d2ff;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 210, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(233, 69, 96, 0.05), transparent 25%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 30px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--text-main), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            width: 70%;
            margin: 0 auto 30px auto;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            background: rgba(0,0,0,0.4);
        }

        button {
            background: linear-gradient(135deg, var(--accent), #ff2a4b);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 20px var(--accent-glow);
            letter-spacing: 1px;
            display: block;
            margin: 0 auto;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(233, 69, 96, 0.6);
        }

        #zone-lecture { display: none; animation: fadeIn 1s ease-out; }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .student-badge {
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--blue);
            border: 1px solid rgba(0, 210, 255, 0.2);
            font-weight: 500;
        }

        #timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 42px;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--blue), var(--accent));
            transition: width 1s linear;
        }

        .lecture-box {
            font-size: 1.25rem;
            line-height: 1.9;
            color: #cbd5e1;
            height: 50vh;
            overflow-y: auto;
            padding-right: 20px;
            text-align: justify;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .lecture-box::-webkit-scrollbar { width: 6px; }
        .lecture-box::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .paragraph { margin-bottom: 30px; }

        .clickable-word {
            color: var(--blue);
            cursor: pointer;
            font-weight: 500;
            position: relative;
            transition: all 0.2s;
            border-bottom: 1px dashed rgba(0, 210, 255, 0.4);
            padding: 0 2px;
        }

        .clickable-word:hover {
            color: #fff;
            background: rgba(0, 210, 255, 0.15);
            border-radius: 4px;
            border-bottom: 1px solid transparent;
            text-shadow: 0 0 8px var(--blue);
        }

        #def-modal {
            display: flex;
            align-items: center;
            gap: 15px;
            position: fixed;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--blue);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.2);
            z-index: 100;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 18px;
            max-width: 80%;
        }

        #def-modal.show { bottom: 40px; }
        
        .def-icon {
            background: var(--blue);
            color: var(--bg-color);
            min-width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-weight: bold;
        }

        #code-final {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--success);
            padding: 30px;
            border-radius: 20px;
            margin-top: 30px;
            text-align: center;
            animation: pulseSuccess 2s infinite;
        }

        .code-title { color: var(--text-muted); font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        .code-value { font-family: 'JetBrains Mono', monospace; font-size: 32px; color: var(--success); font-weight: 800; letter-spacing: 3px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes pulseSuccess { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

    </style>
</head>

    // --- LE CERVEAU D'AUTOMATISATION ---
    // Calculer l'index basé sur le jour du mois (Ex: le 12 du mois)
    const aujourdhui = new Date().getDate();
    const indexLecon = aujourdhui % catalogueLecons.length;
    
    // Extraction automatique des données du jour
    const leconDuJour = catalogueLecons[indexLecon];
    const texteParagraphes = leconDuJour.texte;
    const dico = leconDuJour.definitions;

    const motsExclus = ["dans", "avec", "pour", "mais", "pourrait", "saber", "xling"];
    let modalTimeout;

    // --- LOGIQUE D'AFFICHAGE (Génère le texte cliquable) ---
    function genererTexte() {
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = ""; // Nettoyage
        let motsVusGlobalement = new Set();

        texteParagraphes.forEach(para => {
            let pTag = document.createElement('div');
            pTag.className = 'paragraph';
            
            const fragments = para.split(/(\s+|[,.;’'!?]+)/);
            
            fragments.forEach(frag => {
                const cleanWord = frag.toLowerCase().replace(/[^a-zàâçéèêëîïôûùüÿñæœ]/g, '');
                
                if (cleanWord.length > 3 && !motsExclus.includes(cleanWord) && dico[cleanWord] && !motsVusGlobalement.has(cleanWord)) {
                    let span = document.createElement('span');
                    span.className = 'clickable-word';
                    span.innerText = frag;
                    span.onclick = (e) => {
                        e.stopPropagation();
                        montrerDef(frag, dico[cleanWord]);
                    };
                    pTag.appendChild(span);
                    motsVusGlobalement.add(cleanWord);
                } else {
                    pTag.appendChild(document.createTextNode(frag));
                }
            });
            contentDiv.appendChild(pTag);
        });
    }

    function montrerDef(motOriginal, definition) {
        const modal = document.getElementById('def-modal');
        const texte = document.getElementById('def-text');
        texte.innerHTML = `<strong style="color:var(--blue)">${motOriginal.toUpperCase()}</strong> : ${definition}`;
        modal.classList.add('show');
        clearTimeout(modalTimeout);
        modalTimeout = setTimeout(() => modal.classList.remove('show'), 5000);
    }

    document.addEventListener('click', () => document.getElementById('def-modal').classList.remove('show'));

    function demarrer() {
        const nom = document.getElementById('nomEleve').value.trim();
        if(nom.length < 3) {
            document.getElementById('nomEleve').style.borderColor = "var(--accent)";
            return;
        }
        document.getElementById('zone-login').style.display = 'none';
        document.getElementById('zone-lecture').style.display = 'block';
        document.getElementById('labelNom').innerText = nom;
        genererTexte();
        lancerChrono(nom, 1800);
    }

    function lancerChrono(nom, tempsTotal) {
        let sec = tempsTotal; 
        const bar = document.getElementById('progressBar');
        const interval = setInterval(() => {
            sec--;
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer').innerText = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            bar.style.width = ((tempsTotal - sec) / tempsTotal) * 100 + "%";
            if(sec <= 0) {
                clearInterval(interval);
                terminerSession(nom);
            }
        }, 1000);
    }

    function terminerSession(nom) {
        document.getElementById('timer').innerText = "VÉRIFIÉ";
        document.getElementById('timer').style.color = "var(--success)";
        document.getElementById('progressBar').style.background = "var(--success)";
        document.getElementById('content').style.opacity = "0.2";
        document.getElementById('content').style.pointerEvents = "none";
        const codeBox = document.getElementById('code-final');
        const d = new Date();
        const mois = d.toLocaleString('fr-FR', { month: 'short' }).toUpperCase().replace('.', '');
        let hash = Math.random().toString(36).substring(2, 5).toUpperCase();
        document.getElementById('code-text').innerText = `SABER-${hash}-${mois}`;
        codeBox.style.display = 'block';
        codeBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
