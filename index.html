<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Certification Lexicale - Don Saber</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #e94560; --blue: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 40px; border-radius: 24px; width: 100%; max-width: 900px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: var(--accent); text-align: center; letter-spacing: 3px; text-transform: uppercase; font-size: 24px; }
        #timer { font-size: 48px; font-weight: 800; color: var(--blue); text-align: center; display: block; margin: 10px 0; font-family: monospace; }
        
        .lecture-box { 
            background: #0f172a; padding: 30px; border-radius: 15px; border: 1px solid #334155; 
            line-height: 2; font-size: 1.2em; text-align: justify; max-height: 600px; overflow-y: auto; 
        }

        /* Style des mots cliquables */
        .clickable-word {
            color: var(--blue);
            cursor: pointer;
            transition: 0.2s;
            display: inline-block;
            border-bottom: 1px solid transparent;
        }
        .clickable-word:hover { color: var(--accent); border-bottom-color: var(--accent); transform: translateY(-1px); }

        #code-final { display: none; background: #064e3b; padding: 20px; border-radius: 12px; margin-top: 20px; border: 2px dashed #22c55e; color: #4ade80; text-align: center; font-family: monospace; font-size: 22px; }
        
        /* Modal simple pour définition */
        #def-modal { display: none; position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 100; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Ostad Saber Academy : Immersion Totale</h1>
    
    <div id="zone-login" style="text-align: center;">
        <input type="text" id="nomEleve" placeholder="Votre nom" style="padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; width: 60%;">
        <br><button onclick="demarrer()" style="background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold;">Démarrer (1 min)</button>
    </div>

    <div id="zone-lecture" style="display: none;">
        <span id="timer">01:00</span>
        <div class="lecture-box" id="content">
            </div>
        <div id="code-final"></div>
    </div>
</div>

<div id="def-modal"></div>

<script>
    const texteOriginal = `Quand Amine a décidé de quitter son village natal, il savait que sa vie allait changer profondément. Depuis son enfance, il vivait dans un endroit paisible où les journées se ressemblaient. Les gens se connaissaient tous, et il était difficile de garder un secret. Cette proximité avait ses avantages, mais aussi ses limites. Amine avait souvent l’impression de tourner en rond, comme s’il n’avançait pas vraiment.
    Depuis plusieurs années, il rêvait de découvrir autre chose. Il voulait voir de nouveaux paysages, rencontrer de nouvelles personnes et surtout construire un avenir différent. Cependant, quitter son village n’était pas une décision facile. Sa famille y vivait, ses amis aussi, et chaque rue lui rappelait un souvenir.
    Le jour de son départ, il s’est levé très tôt. Le soleil n’était pas encore complètement levé, et le village était silencieux. Il a regardé une dernière fois sa maison, les champs autour, et les montagnes au loin. À ce moment-là, il a ressenti un mélange étrange de tristesse et d’excitation.
    Le voyage vers la ville a été long. Assis près de la fenêtre du bus, Amine observait les paysages défiler. Petit à petit, les champs ont disparu pour laisser place aux routes, puis aux bâtiments. Plus il s’approchait de la ville, plus il se rendait compte que sa vie ne serait plus jamais la même.
    Quand il est enfin arrivé, il a été surpris par le bruit et le mouvement. Tout allait très vite. Les gens marchaient rapidement, les voitures klaxonnaient, et les lumières des magasins attiraient son attention. Pendant un instant, il s’est demandé s’il avait fait le bon choix.
    Les premiers jours ont été difficiles. Trouver un logement, comprendre les transports, faire les courses… tout lui semblait compliqué. Dans son village, tout était simple. Ici, chaque petite tâche demandait de l’énergie et de l’organisation.
    Le soir, dans son petit appartement, Amine ressentait souvent de la solitude. Il pensait à sa famille, aux repas partagés, aux discussions simples mais sincères. Il lui arrivait même de regretter son ancienne vie.
    Mais Amine n’était pas venu en ville pour abandonner. Il savait que les débuts étaient toujours les plus difficiles. Alors, il a décidé de changer sa façon de penser. Au lieu de voir les obstacles comme des problèmes, il a commencé à les considérer comme des défis.
    Quelques semaines plus tard, il a trouvé un emploi dans une entreprise locale. Le travail n’était pas facile, mais il lui permettait de gagner sa vie et de rencontrer des gens. Ses collègues venaient de différents horizons, et cela lui a permis de découvrir de nouvelles cultures et de nouvelles façons de penser.
    Au début, il parlait peu. Il écoutait beaucoup, observait et essayait de comprendre. Petit à petit, il a commencé à participer aux conversations. Il faisait parfois des erreurs, mais cela ne l’empêchait pas de continuer.
    Un jour, une collègue lui a proposé de sortir après le travail. Amine a hésité, car il n’avait pas l’habitude de ce genre d’activités. Finalement, il a accepté. Ils sont allés dans un café animé, puis ont marché dans les rues illuminées de la ville.
    Cette soirée a été un moment important pour lui. Il s’est senti moins seul, plus intégré. Il a compris que pour s’adapter, il devait faire des efforts, mais aussi accepter l’aide des autres.
    Avec le temps, Amine a développé une routine. Il se levait tôt, travaillait toute la journée, puis prenait du temps pour lui le soir. Parfois, il lisait, parfois il se promenait. Il aimait particulièrement aller dans un parc près de chez lui, où il pouvait se détendre et réfléchir.
    Il a aussi décidé de suivre des cours du soir. Il voulait améliorer ses compétences et avoir plus d’opportunités à l'avenir. Même si cela demandait beaucoup d’efforts, il était fier de lui.
    Petit à petit, la ville est devenue plus familière. Les rues qu’il ne connaissait pas sont devenues des chemins habituels. Les visages inconnus sont devenus des connaissances, puis des amis.
    Bien sûr, tout n’était pas parfait. Il y avait encore des moments de doute, des journées difficiles, et parfois de la fatigue. Mais Amine avait changé. Il était devenu plus fort, plus indépendant.
    Un jour, il est retourné dans son village pour rendre visite à sa famille. Tout semblait pareil, mais lui avait changé. Il regardait les choses différemment. Il appréciait toujours la tranquillité du village, mais il savait qu’il avait désormais sa place ailleurs.
    Ses proches étaient fiers de lui. Ils voyaient qu’il avait grandi, non seulement en âge, mais aussi en expérience. Amine leur racontait ses aventures, ses difficultés, mais aussi ses réussites.
    Avant de repartir, il s’est promené une dernière fois dans les rues de son enfance. Cette fois, il n’a pas ressenti de tristesse, mais plutôt de la reconnaissance. Ce lieu faisait partie de lui, mais il ne le définissait plus complètement.
    De retour en ville, Amine s’est senti chez lui. Il avait trouvé un équilibre entre son passé et son présent. Il comprenait que changer de vie n’était pas seulement une question de lieu, mais aussi une transformation intérieure.
    Aujourd’hui, il ne regrette pas son choix. Bien sûr, le chemin n’a pas été facile, mais il en valait la peine. Il a appris que le courage n’est pas l’absence de peur, mais la capacité d’avancer malgré elle.
    Et même s’il ne sait pas exactement ce que l’avenir lui réserve, une chose est certaine : il est prêt à continuer à avancer.`;

    // Base de données Lexicale Simplifiée (Niveau A0/A1)
    const dico = {
        "profondément": "Beaucoup / Très fort", "paisible": "Calme / Sans bruit", "natal": "Où on est né", "limites": "Fin d'une chose / Obstacles", "proximité": "Fait d'être proche", "excitation": "Joie très forte", "défiler": "Passer devant les yeux", "disparu": "Qu'on ne voit plus", "instant": "Petit moment", "compliqué": "Pas simple / Difficile", "organisation": "Ordre / Préparation", "solitude": "Fait d'être seul", "regretter": "Être triste d'avoir perdu", "abandonner": "Arrêter / Dire 'c'est fini'", "considérer": "Regarder / Penser", "défis": "Tests / Choses à réussir", "horizons": "Origines / Lieux différents", "intégré": "Qui fait partie du groupe", "routine": "Habitude de chaque jour", "opportunités": "Chances de réussir", "indépendant": "Qui fait les choses seul", "tranquillité": "Calme total", "reconnaissance": "Dire merci à la vie", "transformation": "Grand changement", "courage": "Force d'avancer", "réserve": "Garder pour après"
    };

    const motsExclus = ["le", "la", "les", "un", "une", "des", "de", "du", "et", "ou", "mais", "si", "il", "elle", "on", "se", "ce", "au", "aux", "est", "était"];

    function genererTexte() {
        const container = document.getElementById('content');
        const mots = texteOriginal.split(/\b/);
        let motsVus = new Set();

        mots.forEach(mot => {
            const cleanWord = mot.toLowerCase().trim();
            if (cleanWord.length > 3 && !motsExclus.includes(cleanWord) && dico[cleanWord] && !motsVus.has(cleanWord)) {
                let span = document.createElement('span');
                span.className = 'clickable-word';
                span.innerText = mot;
                span.onclick = () => montrerDef(cleanWord);
                container.appendChild(span);
                motsVus.add(cleanWord);
            } else {
                container.appendChild(document.createTextNode(mot));
            }
        });
    }

    function montrerDef(mot) {
        const modal = document.getElementById('def-modal');
        modal.innerText = mot.toUpperCase() + " : " + dico[mot];
        modal.style.display = 'block';
        setTimeout(() => modal.style.display = 'none', 3000);
    }

    function demarrer() {
        const nom = document.getElementById('nomEleve').value;
        if(nom.length < 3) return alert("Nom svp");
        document.getElementById('zone-login').style.display = 'none';
        document.getElementById('zone-lecture').style.display = 'block';
        genererTexte();
        lancerChrono(nom);
    }

    function lancerChrono(nom) {
        let sec = 60;
        const interval = setInterval(() => {
            sec--;
            document.getElementById('timer').innerText = "00:" + (sec < 10 ? "0"+sec : sec);
            if(sec <= 0) {
                clearInterval(interval);
                document.getElementById('code-final').style.display = 'block';
                document.getElementById('code-final').innerText = "CERTIFICAT : " + nom.substring(0,3).toUpperCase() + "-LEX-SABER";
            }
        }, 1000);
    }
</script>
</body>
</html>
