<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Lecture - Étude Dirigée</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #eceff1;
            --text-main: #34495e;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color); 
            color: var(--primary-color);
        }

        .container { 
            width: 90%;
            max-width: 850px;
            background: #ffffff; 
            padding: 50px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }

        #timer-container { 
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            color: #95a5a6;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 10px;
        }

        #timer { 
            font-weight: 700; 
            color: var(--accent-color); 
        }

        h1 { 
            border-left: 6px solid var(--primary-color);
            padding-left: 20px;
            font-size: 2rem;
            margin: 30px 0;
            font-weight: 800;
        }

        #texte {
            font-size: 1.15rem;
            line-height: 1.9;
            text-align: justify;
            color: var(--text-main);
            min-height: 300px;
        }

        /* Suppression des marges inutiles sur le dernier paragraphe */
        #texte p:last-child { margin-bottom: 0; }
    </style>
</head>
<body>

    <main class="container">
        <header id="timer-container" role="timer" aria-live="polite">
            Chronomètre de lecture : <span id="timer">0</span> secondes
        </header>
        
        <h1>Le Lion de Martil</h1>
        
        <article id="texte">
            <p>Le contenu pédagogique sera inséré ici.</p>
        </article>
    </main>

    <script>
        (function() {
            let secondes = 0;
            const timerElement = document.getElementById('timer');
            
            // Utilisation d'une fonction nommée pour plus de clarté
            const incrementerTimer = () => {
                secondes++;
                timerElement.textContent = secondes;
            };

            setInterval(incrementerTimer, 1000);
        })();
    </script>

</body>
</html>
